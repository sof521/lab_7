<!DOCTYPE html>
<head>
  <link rel="icon" href="data:,">
  
  <script type="module">
    import 'https://cdn.jsdelivr.net/npm/@google/model-viewer@3.4.0';
    import 'https://cdn.jsdelivr.net/npm/@google/model-viewer-effects@3.4.0';
  </script>
  
  <style>
    body { margin: 100; overflow: hidden; }
    model-viewer { width: 100%; height: 100vh; }
  </style>
</head>
<body>

<model-viewer 
  id="paused-change"
  src="cat.glb" 
  ar 
  ar-modes="webxr scene-viewer quick-look" 
  camera-controls tone-mapping="neutral" 
  shadow-intensity="1" 
  autoplay> 

  <effect-composer>
    <outline-effect color="blue"></outline-effect>
    <bloom-effect></bloom-effect>
  </effect-composer>
</model-viewer>

<script>
    (() => {
    const modelViewer = document.querySelector('#paused-change');
    console.log(modelViewer.availableAnimations);

    setInterval(() => {
      modelViewer.animationName =
        modelViewer.animationName === 'Action1' ? 'Action2' : 'Action1';
  }, 3333);
    })();
</script>

</body>
</html>
