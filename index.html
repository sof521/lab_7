<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; width: 100vw; height: 100vh; }
    model-viewer { width: 100%; height: 50%; }
  </style>
</head>
<body>

<model-viewer 
  id="paused-change"
  src="cat.glb" 
  ar 
  ar-modes="webxr scene-viewer quick-look" 
  camera-controls tone-mapping="neutral" 
  shadow-intensity="1" 
  autoplay> 
</model-viewer>
<script>
    (() => {
    const modelViewer = document.querySelector('#paused-change');
    console.log(modelViewer.availableAnimations);

    self.setInterval(() => {
        modelViewer.animationName = modelViewer.animationName === 'Action2' ?
        'Action1' : 'Action2';
    }, 3000.0);
    })();
</script>

</body>
</html>
