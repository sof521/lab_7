<!DOCTYPE html>
<head>
  
  <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.1/dist/es-module-shims.js"></script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@^0.182.0/build/three.module.min.js"
      }
    }
    </script>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer-module.min.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer-effects/dist/model-viewer-effects.min.js"></script>
  
  <style>
    body { margin: 100; overflow: hidden; }
    model-viewer { width: 100%; height: 100vh; }
  </style>
</head>
<body>

<model-viewer 
  id="paused-change"
  src="cat.glb" 
  ar 
  ar-modes="webxr scene-viewer quick-look" 
  camera-controls tone-mapping="neutral" 
  shadow-intensity="1" 
  autoplay> 

  <effect-composer>
    <outline-effect color="blue"></outline-effect>
    <bloom-effect></bloom-effect>
    <color-grade-effect></color-grade-effect> 
  </effect-composer>
</model-viewer>

<script>
    (() => {
    const modelViewer = document.querySelector('#paused-change');
    console.log(modelViewer.availableAnimations);

    setInterval(() => {
      modelViewer.animationName =
        modelViewer.animationName === 'Action1' ? 'Action2' : 'Action1';
  }, 3000);
    })();
</script>

</body>
</html>
