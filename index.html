<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.1/dist/es-module-shims.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.min.js"
    }
  }
  </script>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer-module.min.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer-effects/dist/model-viewer-effects.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; width: 100vw; height: 100vh; }
    model-viewer { width: 100%; height: 50%; }
  </style>
</head>
<body>

<model-viewer 
  id="paused-change"
  src="cat.glb" 
  ar 
  ar-modes="webxr scene-viewer quick-look" 
  camera-controls tone-mapping="neutral" 
  shadow-intensity="1" 
  autoplay> 

  <effect-composer>
    <glitch-effect></glitch-effect>
    <bloom-effect intensity="1.2"></bloom-effect>
  </effect-composer>
</model-viewer>

<script>
    (() => {
    const modelViewer = document.querySelector('#paused-change');
    console.log(modelViewer.availableAnimations);

    self.setInterval(() => {
        modelViewer.animationName = modelViewer.animationName === 'Action1' ?
        'Action2' : 'Action1';
    }, 3000.0);
    })();
</script>

</body>
</html>
