<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: white;
    }

    model-viewer { 
      width: 100%; 
      height: 100vh; 
    }

    .outline {
      filter:
        drop-shadow(0 0 4px rgba(0, 119, 255, 0.412))
        drop-shadow(0 0 10px rgba(0, 94, 255, 0.416))
        drop-shadow(0 0 20px rgba(0, 106, 255, 0.279));
    }

    .float {
      animation: floatAnim 2s ease-in-out infinite;
    }

    @keyframes floatAnim {
      0% {
        transform: translateY(0px) scale(1);
      }

      50% {
        transform: translateY(-25px) scale(1.03);
      }

      100% {
        transform: translateY(0px) scale(1);
      }
    }

  </style>
</head>

<body>

<model-viewer 
  id="mv"
  class="outline float"
  src="cat.glb" 
  scale="0.6 0.6 0.6"
  ar 
  ar-modes="webxr scene-viewer quick-look" 
  camera-controls 
  tone-mapping="neutral" 
  shadow-intensity="1" 
  autoplay>
</model-viewer>

<script>
(() => {
  const mv = document.querySelector('#mv');

  /* переключение анимаций */
  setInterval(() => {
    mv.animationName =
      mv.animationName === 'Action1' ? 'Action2' : 'Action1';
  }, 3000);
})();
</script>

</body>
</html>
